 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick File Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;0,800;1,400&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        deep:'#0b0b0b', surface:'#131313', elevated:'#1a1a1a', panel:'#1f1f1f',
        bordercol:'#252525',
        acc: { blue:'#5c9dff', green:'#39d353', red:'#f85149', amber:'#e3b341', purple:'#bc8cff', teal:'#2dd4bf' }
      },
      fontFamily: { mono:['JetBrains Mono','monospace'], sans:['Product Sans','Google Sans','Open Sans','sans-serif'] }
    }
  }
}
</script>
<style>
:root {
  --blue:#5c9dff; --green:#39d353; --red:#f85149;
  --amber:#e3b341; --purple:#bc8cff; --teal:#2dd4bf;
  --surface:rgba(19, 19, 19, 0.95); --elevated:rgba(26, 26, 26, 0.95); --panel:rgba(31, 31, 31, 0.95);
  --border:rgba(255, 255, 255, 0.1); --tp:#e6edf3; --tm:#8b949e; --td:#484f58;
}
* { box-sizing:border-box; outline:none !important; }
body {
  background:radial-gradient(circle at 50% 50%, #0d1117 0%, #07090e 100%);
  color:var(--tp);
  font-family:'Product Sans','Google Sans','Open Sans',sans-serif;
  font-size:13px;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding: 40px 20px;
  margin: 0;
}
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
button { cursor:pointer; border-radius:2px; border:none; font-family:'JetBrains Mono',monospace; }
.card { background:var(--surface); border:none; border-radius:12px; }
.card:hover { background:rgba(255, 255, 255, 0.03); }
.btn {
  border:none !important;
  color:var(--tm);
  padding:5px 12px;
  font-size:11px;
  letter-spacing:.04em;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(4px);
  border-radius:3px;
  transition:all 120ms;
}
.btn:hover { color:var(--tp); background:rgba(255,255,255,0.08); }
.btn-amber { color:var(--amber); } .btn-amber:hover { background:rgba(227,179,65,.15); }
.mono { font-family:'JetBrains Mono',monospace; }
#toasts { position:fixed; bottom:16px; right:16px; display:flex; flex-direction:column; gap:6px; z-index:9999; }
.toast {
  padding:10px 14px; background:var(--panel); border:1px solid var(--border); border-left:3px solid;
  font-family:'JetBrains Mono',monospace; font-size:11px; animation:slideUp 150ms ease-out forwards;
  max-width:320px; line-height:1.5;
}
.toast.amber { border-left-color:var(--amber); color:var(--amber); }
.toast.blue { border-left-color:var(--blue); color:var(--blue); }
.toast.green { border-left-color:var(--green); color:var(--green); }
.toast.red { border-left-color:var(--red); color:var(--red); }
@keyframes slideUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.anim-slide-up { animation:slideUp 180ms ease-out; }
#app-container { width: 100%; max-width: 800px; height: 80vh; display: flex; flex-direction: column; }
.file-card {
  display: flex; flex-direction: column; gap: 12px;
  background: rgba(255,255,255,0.03); padding: 16px;
  border-radius: 8px; border: 1px solid var(--border);
  transition: all 0.2s;
}
.file-card:hover { border-color: var(--amber); transform: translateY(-2px); }
.file-actions { display: flex; gap: 8px; margin-top: auto; }
</style>
</head>
<body>
<div id="toasts"></div>
<div id="app-container">
  <div class="card" style="flex:1;display:flex;flex-direction:column;padding:20px;overflow:hidden;background:rgba(255,255,255,0.02)">
    
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0">
      <div id="notes-view-title" class="mono" style="font-size:12px;letter-spacing:.08em;color:var(--amber)">QUICK FILES (SUPABASE)</div>
      
      <input type="file" id="file-upload-input" style="display:none" onchange="window.uploadFile(event)">
      
      <button class="btn btn-amber" style="padding:6px 14px;font-size:11px;background:rgba(227,179,65,0.08)" onclick="document.getElementById('file-upload-input').click()">
        <i class="fa-solid fa-cloud-arrow-up"></i> UPLOAD FILE
      </button>
    </div>
    
    <div id="upload-progress-container" style="display:none; width:100%; height:4px; background:rgba(255,255,255,0.05); border-radius:2px; margin-bottom:16px; overflow:hidden;">
        <div id="upload-progress-bar" style="width:0%; height:100%; background:var(--amber); transition:width 0.2s ease-out;"></div>
    </div>

    <div id="files-container" style="flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:12px;align-content:start;padding-right:4px;">
        </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- HARDCODED SUPABASE KEYS (PUBLISHABLE ONLY) ---
const SUPABASE_URL = 'https://fxnrugbvbfyamtrfmjea.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_FnWYWD7C9Tvc1YNtVYQ1dA_aPwVsCmE';

// UPDATED TO MATCH YOUR DASHBOARD EXACTLY
const BUCKET_NAME = 'docs'; 

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// --- UTILS ---
function toast(msg, type='blue') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = msg;
  c.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(10px)'; setTimeout(()=>el.remove(),200); }, 3500);
}

function formatBytes(bytes, decimals = 2) {
    if (!+bytes) return '0 Bytes';
    const k = 1024; const dm = decimals < 0 ? 0 : decimals;
    const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
}

// --- APP LOGIC ---

// 1. Fetch Files
window.loadFiles = async function() {
    const container = document.getElementById('files-container');
    container.innerHTML = '<div style="color:var(--tm); font-family:monospace;">Loading files...</div>';

    const { data, error } = await supabase.storage.from(BUCKET_NAME).list();
    
    if (error) {
        container.innerHTML = `<div style="color:var(--red); font-family:monospace;">Error: ${error.message} (Did you create the policies?)</div>`;
        return toast('Failed to load files', 'red');
    }

    container.innerHTML = '';
    
    // Filter out Supabase placeholder files
    const files = data.filter(f => f.name !== '.emptyFolderPlaceholder');

    if (files.length === 0) {
        container.innerHTML = '<div style="color:var(--tm); font-family:monospace;">No files found. Upload one!</div>';
        return;
    }

    files.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).forEach(file => {
        const ext = file.name.split('.').pop().toLowerCase();
        let icon = 'fa-file';
        if(['png','jpg','jpeg','gif','webp'].includes(ext)) icon = 'fa-image';
        if(['pdf'].includes(ext)) icon = 'fa-file-pdf';
        if(['doc','docx'].includes(ext)) icon = 'fa-file-word';
        if(['mp4','webm','mov'].includes(ext)) icon = 'fa-file-video';

        const { data: urlData } = supabase.storage.from(BUCKET_NAME).getPublicUrl(file.name);
        const fileUrl = urlData.publicUrl;

        const el = document.createElement('div');
        el.className = 'file-card anim-slide-up';
        el.innerHTML = `
            <div style="display:flex; gap:12px; align-items:center;">
                <div style="width:40px;height:40px;border-radius:8px;background:rgba(227,179,65,0.1);display:flex;align-items:center;justify-content:center;color:var(--amber);font-size:18px;">
                    <i class="fa-solid ${icon}"></i>
                </div>
                <div style="overflow:hidden; flex:1;">
                    <div style="font-weight:600; font-size:13px; color:var(--tp); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${file.name}">${file.name}</div>
                    <div style="font-size:11px; color:var(--tm); font-family:'JetBrains Mono',monospace;">${formatBytes(file.metadata?.size || 0)}</div>
                </div>
            </div>
            <div class="file-actions">
                <button class="btn" style="flex:1" onclick="window.copyLink('${fileUrl}')"><i class="fa-solid fa-link"></i> LINK</button>
                <a href="${fileUrl}" target="_blank" class="btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center; flex:1;"><i class="fa-solid fa-arrow-up-right-from-square"></i> OPEN</a>
                <button class="btn" style="color:var(--red)" onclick="window.deleteFile('${file.name}')"><i class="fa-solid fa-trash"></i></button>
            </div>
        `;
        container.appendChild(el);
    });
};

// 2. Upload File
window.uploadFile = async function(event) {
    const file = event.target.files[0];
    if(!file) return;

    // Reset input so same file can be selected again if needed
    event.target.value = '';

    const barContainer = document.getElementById('upload-progress-container');
    const bar = document.getElementById('upload-progress-bar');
    barContainer.style.display = 'block';
    bar.style.width = '30%';
    
    toast('Uploading file...', 'amber');

    // Add a timestamp to prevent overwriting files with the same name
    const fileName = `${Date.now()}_${file.name}`;

    const { data, error } = await supabase.storage.from(BUCKET_NAME).upload(fileName, file, {
        cacheControl: '3600',
        upsert: false
    });

    bar.style.width = '100%';
    setTimeout(() => { barContainer.style.display = 'none'; bar.style.width = '0%'; }, 500);

    if (error) {
        console.error(error);
        return toast('Upload failed: ' + error.message, 'red');
    }

    toast('File uploaded successfully!', 'green');
    window.loadFiles();
};

// 3. Delete File
window.deleteFile = async function(fileName) {
    if(!confirm(`Are you sure you want to delete this file?`)) return;

    toast('Deleting...', 'amber');
    const { error } = await supabase.storage.from(BUCKET_NAME).remove([fileName]);

    if(error) return toast('Delete failed: ' + error.message, 'red');
    
    toast('File deleted', 'amber');
    window.loadFiles();
};

// 4. Copy Link
window.copyLink = function(url) {
    navigator.clipboard.writeText(url).then(() => {
        toast('Public link copied to clipboard!', 'blue');
    }).catch(() => {
        toast('Failed to copy link', 'red');
    });
};

// Initialize App
window.onload = () => {
    window.loadFiles();
};
</script>
</body>
</html>
